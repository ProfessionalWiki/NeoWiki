services:
  mediawiki:
    image: ghcr.io/professionalwiki/neowiki:latest
    restart: unless-stopped
    ports:
      - "${MW_SERVER_PORT:-8484}:80"
    volumes:
      - mediawiki-images-data:/var/www/html/w/images
      # Uncomment to use custom LocalSettings.
      # - ./LocalSettings.php:/var/www/html/w/LocalSettings.php:ro
    depends_on:
      - db
      - neo
    environment:
      - MARIADB_DATABASE
      - MARIADB_USER
      - MARIADB_PASSWORD
      - MW_SERVER
      - NEO4J_URL_EXTERNAL
      - NEO4J_USERNAME
      - NEO4J_PASSWORD
      - NEO4J_USERNAME_READ
      - NEO4J_PASSWORD_READ
    healthcheck:
      test: "curl -fs http://localhost:80/wiki/Special:Version | grep -q 'Jeroen De Dauw'"
      interval: 60s
      timeout: 5s
      retries: 1

  # NOTE (v2 shared-backend mode): in a future iteration, db/neo/test_neo will
  # be tagged with a `local-backend` profile so they can be opted out of when
  # SHARED_BACKEND=1 is set, allowing multiple worktrees to share an external
  # MariaDB and Neo4j instance. In v1 they stay on by default (no profile).
  db:
    image: mariadb:11.8
    restart: unless-stopped
    volumes:
      - mediawiki-db-data:/var/lib/mysql
    environment:
      - MARIADB_ROOT_PASSWORD
      - MARIADB_DATABASE
      - MARIADB_USER
      - MARIADB_PASSWORD
    healthcheck:
      test: ["CMD", "mariadb-admin" ,"ping", "-h", "localhost"]
      interval: 10s
      timeout: 10s
      retries: 4

  neo:
    image: neo4j:enterprise
    restart: unless-stopped
    volumes:
      - neo4j-data:/data
    environment:
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=eval
      - NEO4J_AUTH
    healthcheck:
      test: "wget http://localhost:7474/browser -O - | grep 'Neo4j Browser'"
      interval: 5s
      timeout: 1s
      retries: 10

  test_neo:
    image: neo4j:enterprise
    profiles: [dev]
    restart: unless-stopped
    volumes:
      - test-neo4j-data:/data
    environment:
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=eval
      # Hardcoded password (intentional): NeoWiki's test suite uses this
      # fixed credential to connect to the test Neo4j instance. Do not
      # parameterize without also updating the test configuration.
      - NEO4J_AUTH=neo4j/password
      - NEO4J_server_bolt_listen__address=:7689
      - NEO4J_server_http_listen__address=:7475
    healthcheck:
      test: "wget http://localhost:7475/browser -O - | grep 'Neo4j Browser'"
      interval: 5s
      timeout: 1s
      retries: 10

  node:
    image: node:24
    profiles: [dev]
    restart: on-failure:3
    working_dir: /workspace/resources/ext.neowiki
    volumes:
      - ../:/workspace:z
    command: sh -c "npm install && npm run build:watch"
    environment:
      - npm_config_cache=/tmp/.npm

  mailcatcher:
    image: sj26/mailcatcher
    profiles: [dev]
    restart: unless-stopped
    ports:
      - "${MAILCATCHER_PORT:-1080}:1080"

  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    profiles:
      - server
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - MW_SERVER
    depends_on:
      - mediawiki

volumes:
  mediawiki-db-data:
  mediawiki-images-data:
  neo4j-data:
  test-neo4j-data:
  caddy-data:
  caddy-config:
