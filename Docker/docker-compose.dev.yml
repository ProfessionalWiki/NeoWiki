services:
  mediawiki:
    image: !reset null
    build:
      context: .
      target: dev-mw
    environment:
      - MW_MODE=dev
    volumes:
      - mediawiki-images-data:/var/www/html/w/images
      # NeoWiki source bind-mount (the worktree).
      - ../:/var/www/html/w/extensions/NeoWiki
      # Optional read-only overlay of additional MediaWiki extensions for IDE indexing
      # or integration testing. Set MW_EXTRA_EXTENSIONS_DIR to a host directory of
      # extensions; when unset, falls back to a tracked empty dir so the mount is
      # always valid. Files here are not auto-loaded.
      - ${MW_EXTRA_EXTENSIONS_DIR:-./empty-extensions-extra}:/var/www/html/w/extensions-extra:ro
      # Per-worktree opt-in override that the user edits to load extra extensions,
      # tweak debug toggles, etc. The Makefile's bootstrap target touches this file
      # on the host so the bind mount is always valid; SettingsTemplate.php's
      # require_once is gated on file_exists so an empty file is harmless.
      - ./LocalSettings.local.php:/var/www/html/w/LocalSettings.local.php
      # Bind-mount MW core's vendor directory back to the host so the entrypoint's
      # composer update (which merges NeoWiki deps via composer-merge-plugin) writes
      # through. Result: host's Docker/mediawiki/vendor/ ends up with the full
      # post-merge state, which IDE autocomplete and AI tooling rely on.
      # composer.lock stays in the image (MW REL1_43 does not track one) — small
      # inconsistency, but it stops a non-existent file from being bind-mounted as
      # an empty directory.
      - ./mediawiki/vendor:/var/www/html/w/vendor
