services:
  mediawiki:
    image: !reset null
    build:
      context: .
      target: dev-mw
    environment:
      - MW_MODE=dev
    volumes:
      - mediawiki-images-data:/var/www/html/w/images
      # NeoWiki source bind-mount (the worktree).
      - ../:/var/www/html/w/extensions/NeoWiki:z
      # Optional read-only overlay of additional MediaWiki extensions for IDE indexing
      # or integration testing. Set MW_EXTRA_EXTENSIONS_DIR to a host directory of
      # extensions; when unset, falls back to a tracked empty dir so the mount is
      # always valid. Files here are not auto-loaded.
      - ${MW_EXTRA_EXTENSIONS_DIR:-./empty-extensions-extra}:/var/www/html/w/extensions-extra:ro,z
      # Per-worktree opt-in override that the user edits to load extra extensions,
      # tweak debug toggles, etc. The Makefile's bootstrap target touches this file
      # on the host so the bind mount is always valid; SettingsTemplate.php's
      # require_once is gated on file_exists so an empty file is harmless.
      - ./LocalSettings.local.php:/var/www/html/w/LocalSettings.local.php:z
      # Bind-mount MW core's vendor directory back to the host so the entrypoint's
      # composer update (which merges NeoWiki deps via composer-merge-plugin) writes
      # through. Result: host's Docker/mediawiki/vendor/ ends up with the full
      # post-merge state, which IDE autocomplete and AI tooling rely on.
      # composer.lock stays in the image (MW REL1_43 does not track one) — small
      # inconsistency, but it stops a non-existent file from being bind-mounted as
      # an empty directory.
      - ./mediawiki/vendor:/var/www/html/w/vendor:z

  # Dev-only sidecars. They live in this overlay (not the base file) so the base
  # "try-it-out" stack stays minimal and so `make down` removes them as orphans
  # regardless of the compose backend. See the Makefile `down` target.
  test_neo:
    image: neo4j:enterprise
    restart: unless-stopped
    volumes:
      - test-neo4j-data:/data
    environment:
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=eval
      # Hardcoded password (intentional): NeoWiki's test suite uses this
      # fixed credential to connect to the test Neo4j instance. Do not
      # parameterize without also updating the test configuration.
      - NEO4J_AUTH=neo4j/password
      - NEO4J_server_bolt_listen__address=:7689
      - NEO4J_server_http_listen__address=:7475
    healthcheck:
      test: "wget http://localhost:7475/browser -O - | grep 'Neo4j Browser'"
      interval: 5s
      timeout: 1s
      retries: 10

  node:
    image: node:24
    restart: on-failure:3
    # Run as the host user so node_modules/ and dist/ written into the bind mount
    # are host-owned, matching the Makefile's EXEC_USER. The Makefile exports
    # NODE_USER (host uid:gid under rootful Docker, 0:0 under rootless Podman, which
    # remaps container-root to the host user). The 1000:1000 default only covers a
    # manual `docker compose up` (outside make) on a host whose uid is 1000.
    user: "${NODE_USER:-1000:1000}"
    working_dir: /workspace/resources/ext.neowiki
    volumes:
      - ../:/workspace:z
    command: sh -c "npm install && npm run build:watch"
    environment:
      - npm_config_cache=/tmp/.npm
      # NODE_USER is the host's `id -u`, which on another machine may have no
      # /etc/passwd entry in node:24 — HOME would then default to the unwritable
      # '/'. Give npm a writable HOME for its logs/config. (On a uid-1000 host this
      # is a no-op: uid 1000 is the image's `node` user, HOME=/home/node.)
      - HOME=/tmp

  mailcatcher:
    image: sj26/mailcatcher
    restart: unless-stopped
    ports:
      - "${MAILCATCHER_PORT:-1080}:1080"

volumes:
  test-neo4j-data:
